name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify package version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          PACKAGE_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          if [ "${VERSION}" != "${PACKAGE_VERSION}" ]; then
            echo "Tag ${TAG} does not match package.json version ${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Build release archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          ROOT="dist/local-process-${VERSION}"
          mkdir -p "${ROOT}"
          rsync -a \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".idea" \
            --exclude "*.iml" \
            --exclude "dist" \
            --exclude "node_modules" \
            ./ "${ROOT}/"
          node -e "require('fs').writeFileSync('${ROOT}/release.json', JSON.stringify({ repository: process.env.GITHUB_REPOSITORY, version: '${VERSION}', assetName: 'local-process-${VERSION}.tar.gz' }, null, 2) + '\n')"
          sed "s/__LPS_RELEASE_REPOSITORY__/${GITHUB_REPOSITORY//\//\\/}/g" install.sh > "dist/install.sh"
          chmod +x "dist/install.sh"
          tar -czf "dist/local-process-${VERSION}.tar.gz" -C "dist/local-process-${VERSION}" .

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          ASSET="dist/local-process-${VERSION}.tar.gz"
          INSTALLER="dist/install.sh"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${ASSET}" "${INSTALLER}" --clobber
          else
            gh release create "${TAG}" "${ASSET}" "${INSTALLER}" \
              --latest \
              --title "Local Process ${VERSION}" \
              --notes "Local Process ${VERSION}"
          fi
